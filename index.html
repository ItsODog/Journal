<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Journal</title>
    <!-- Add viewport meta tag for responsive scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, serif;
            background-color: floralwhite;
            color: #4e4d4c;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            width: 100%;
            max-width: 1000px;
            /* allow it to shrink on smaller screens */
            flex-wrap: wrap;
            justify-content: center;
        }

        #savedEntriesWrapper {
            width: 300px;
            margin-top: 44px;
            min-width: 280px;
            flex-shrink: 0;
        }

        #savedList {
            padding: 10px;
            border: 1px solid #f1e5cf;
            background-color: #fffdf9;
            border-radius: 6px;
            max-height: 80vh; /* Use viewport height to avoid overflow */
            overflow-y: auto;
        }

            #savedList div {
                margin-bottom: 12px;
                display: flex;
                flex-direction: column;
                gap: 4px;
                border-bottom: 1px solid #e0d6c6;
                padding-bottom: 6px;
            }

        .entry-date {
            font-size: 13px;
            color: #777;
        }

        .entry-title {
            font-size: 15px;
            font-weight: bold;
        }

        .entry-buttons {
            margin-top: 4px;
            display: flex;
            gap: 8px;
        }

        #savedList .entry-buttons button {
            font-size: 14px;
            background-color: #cdc5b4;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

            #savedList .entry-buttons button:hover {
                background-color: #858178;
            }

        .editor-area {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 700px;
            min-width: 280px;
            flex-shrink: 1;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

            .toolbar button,
            .buttons button {
                background-color: #cdc5b4;
                color: white;
                border: none;
                padding: 6px 12px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 14px;
                transition: background-color 0.2s ease;
            }

                .toolbar button:hover,
                .buttons button:hover {
                    background-color: #858178;
                }

                .toolbar button.active {
                    background-color: #4e4d4c;
                }

        #editor {
            /* height reduced and made responsive */
            height: 45vh;
            max-height: 1000px;
            background-color: #fffdf9;
            border: 2px solid #f1e5cf;
            padding: 24px;
            font-size: 18px;
            font-family: Georgia, serif;
            line-height: 1.6;
            outline: none;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            min-height: 200px;
            resize: vertical; /* allow user resizing if desired */
        }

        .buttons {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            #editor {
                font-size: 16px;
                padding: 16px;
            }

            .toolbar button,
            .buttons button {
                font-size: 12px;
                padding: 5px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="savedEntriesWrapper">
            <div id="savedList">No saved entries yet.</div>
        </div>

        <div class="editor-area">
            <div class="toolbar">
                <button onclick="document.execCommand('bold'); updateFormattingStates();"><b>B</b></button>
                <button onclick="document.execCommand('italic'); updateFormattingStates();"><i>I</i></button>
                <button onclick="document.execCommand('underline'); updateFormattingStates();"><u>U</u></button>
                <button onclick="document.execCommand('insertUnorderedList'); updateFormattingStates();">• List</button>
            </div>

            <div id="editor" contenteditable="true"></div>

            <div class="buttons">
                <button id="saveBtn">Save</button>
                <button id="newEntryBtn">New Entry</button>
            </div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const saveBtn = document.getElementById('saveBtn');
        const newEntryBtn = document.getElementById('newEntryBtn');
        const savedList = document.getElementById('savedList');
        const STORAGE_KEY = 'journalEntries';

        let currentEntryIndex = null;

        function loadEntries() {
            const saved = localStorage.getItem(STORAGE_KEY);
            return saved ? JSON.parse(saved) : [];
        }

        function saveEntries(entries) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
        }

        function formatDateOnly(timestamp) {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(timestamp).toLocaleDateString(undefined, options);
        }

        function renderSavedEntries() {
            const entries = loadEntries();
            if (entries.length === 0) {
                savedList.innerHTML = 'No saved entries yet.';
                return;
            }
            savedList.innerHTML = '';
            entries.forEach((entry, index) => {
                const container = document.createElement('div');

                const date = formatDateOnly(entry.timestamp);
                const plainText = entry.text.replace(/<[^>]*>/g, '');
                const title = entry.title || plainText.substring(0, 30) + (plainText.length > 30 ? '...' : '');

                const dateSpan = document.createElement('div');
                dateSpan.className = 'entry-date';
                dateSpan.textContent = date;

                const titleSpan = document.createElement('div');
                titleSpan.className = 'entry-title';
                titleSpan.textContent = title;

                const buttonGroup = document.createElement('div');
                buttonGroup.className = 'entry-buttons';

                const loadBtn = document.createElement('button');
                loadBtn.textContent = 'Load';
                loadBtn.onclick = () => {
                    editor.innerHTML = entry.text;
                    currentEntryIndex = index;
                    updateFormattingStates();
                };

                const delBtn = document.createElement('button');
                delBtn.textContent = 'Delete';
                delBtn.onclick = () => {
                    if (confirm('Delete this entry?')) {
                        const entries = loadEntries();
                        entries.splice(index, 1);
                        saveEntries(entries);
                        renderSavedEntries();
                        if (editor.innerHTML === entry.text) {
                            editor.innerHTML = '';
                            currentEntryIndex = null;
                            updateFormattingStates();
                        }
                    }
                };

                buttonGroup.appendChild(loadBtn);
                buttonGroup.appendChild(delBtn);

                container.appendChild(dateSpan);
                container.appendChild(titleSpan);
                container.appendChild(buttonGroup);

                savedList.appendChild(container);
            });
        }

        saveBtn.onclick = () => {
            const html = editor.innerHTML.trim();
            if (!html || html === '<br>') {
                alert('Cannot save empty entry!');
                return;
            }

            const entries = loadEntries();

            if (currentEntryIndex !== null) {
                // Overwrite existing
                entries[currentEntryIndex] = {
                    text: html,
                    title: entries[currentEntryIndex].title,
                    timestamp: entries[currentEntryIndex].timestamp
                };
            } else {
                // Create new
                let title = prompt('Enter a title for this entry:');
                if (title) title = title.trim();

                entries.push({
                    text: html,
                    title: title || null,
                    timestamp: Date.now()
                });
                currentEntryIndex = entries.length - 1;
            }

            saveEntries(entries);
            renderSavedEntries();
            alert('Entry saved!');
        };

        newEntryBtn.onclick = () => {
            if (confirm('Clear the editor and start a new entry? Unsaved changes will be lost.')) {
                editor.innerHTML = '';
                currentEntryIndex = null;
                editor.focus();
                updateFormattingStates();
            }
        };

        function insertFreshListAtCursor() {
            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            const range = selection.getRangeAt(0);

            if (range.startContainer.nodeType === 3) {
                let text = range.startContainer.textContent;
                text = text.replace(/-$/, '');
                range.startContainer.textContent = text;
                range.setStart(range.startContainer, text.length);
                range.collapse(true);
                selection.removeAllRanges();
                selection.addRange(range);
            }

            const ul = document.createElement('ul');
            const li = document.createElement('li');
            li.appendChild(document.createElement('br'));
            ul.appendChild(li);

            range.deleteContents();
            range.insertNode(ul);

            const newRange = document.createRange();
            newRange.setStart(li, 0);
            newRange.collapse(true);
            selection.removeAllRanges();
            selection.addRange(newRange);

            ul.scrollIntoView({ block: 'nearest' });
        }

        editor.addEventListener('keydown', (e) => {
            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            const range = selection.getRangeAt(0);
            const node = range.startContainer;

            if (node.nodeType === 3) {
                const len = node.textContent.length;
                if (range.startOffset > len) {
                    range.setStart(node, len);
                    range.collapse(true);
                    selection.removeAllRanges();
                    selection.addRange(range);
                }
            }

            if (e.key === 'Tab') {
                const li = node.nodeType === 3 ? node.parentElement.closest('li') : node.closest('li');
                if (li) {
                    e.preventDefault();
                    if (e.shiftKey) {
                        document.execCommand('outdent');
                    } else {
                        document.execCommand('indent');
                    }
                    return;
                }
            }

            if (e.key === ' ' && node.nodeType === 3) {
                const textBeforeCursor = node.textContent.slice(0, range.startOffset);
                if (/^\s*-\s*$/.test(textBeforeCursor)) {
                    e.preventDefault();
                    insertFreshListAtCursor();
                    return;
                }
            }

            if (e.key === 'Enter') {
                const li = node.nodeType === 3 ? node.parentElement.closest('li') : node.closest('li');
                if (li && li.textContent.trim() === '') {
                    e.preventDefault();
                    document.execCommand('outdent');
                    return;
                }
            }
        });

        function updateFormattingStates() {
            document.querySelectorAll('.toolbar button[onclick]').forEach(button => {
                let cmdMatch = button.getAttribute('onclick').match(/'([^']+)'/);
                if (!cmdMatch) return;
                const cmd = cmdMatch[1];
                const active = document.queryCommandState(cmd);
                button.classList.toggle('active', active);
            });
        }

        editor.addEventListener('keyup', updateFormattingStates);
        editor.addEventListener('mouseup', updateFormattingStates);

        updateFormattingStates();
        renderSavedEntries();
    </script>
</body>
</html>
